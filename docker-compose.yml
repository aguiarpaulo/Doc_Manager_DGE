services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ged}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-ged}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ged}"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || curl -f http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      GED_ENVIRONMENT: production
      GED_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ged}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ged}
      GED_JWT_SECRET: ${GED_JWT_SECRET:?set GED_JWT_SECRET in .env}
      GED_MINIO_ENDPOINT: minio:9000
      GED_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      GED_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      GED_MINIO_BUCKET: ${GED_MINIO_BUCKET:-documents}
      GED_MINIO_SECURE: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  # HTTPS termination (GAP-002). Default choice: Caddy with automatic TLS.
  # For a real domain set CADDY_DOMAIN and Caddy provisions a certificate automatically;
  # locally it falls back to an internal self-signed cert.
  caddy:
    image: caddy:2-alpine
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:-localhost}
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  pg_data:
  minio_data:
  caddy_data:
  caddy_config:
