[project]
name = "ged-dge"
version = "0.1.0"
description = "GED DGE - Gestao Eletronica de Documentos para Obras"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "sqlalchemy>=2.0",
    "alembic>=1.14",
    "psycopg[binary]>=3.2",
    "structlog>=24.4",
    "pydantic-settings>=2.6",
    "bcrypt>=4.2",
    "pyjwt>=2.10",
    "email-validator>=2.2",
    "minio>=7.2",
    "python-multipart>=0.0.12",
    "pyotp>=2.9",
]

[project.optional-dependencies]
ui = [
    "streamlit>=1.40",
    "requests>=2.32",
]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "httpx>=0.28",
    "ruff>=0.8",
    "streamlit>=1.40",
    "requests>=2.32",
]

[tool.ruff]
line-length = 100
target-version = "py312"
# Alembic revision files are autogenerated; don't lint them.
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
# B008: FastAPI relies on function calls (Depends/HTTPBearer) in argument defaults.
ignore = ["B008"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["app"]
